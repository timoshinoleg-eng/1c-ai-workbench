name: Publish to MCP Registry

# Триггер — push тега v* (как у Release). Не workflow_run: тот срабатывает
# только если файл есть в default-ветке (main), а релизы тегируются из рабочей
# ветки. push:tags работает из любой ветки/тега.
#
# Запускается параллельно с Release, поэтому ПЕРВЫМ делом ждём, пока Release
# выложит бинарники в GitHub Release (npm-пакет тянет их на postinstall).
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write   # нужно для аутентификации mcp-publisher через GitHub OIDC

    env:
      TAG: ${{ github.ref_name }}
      REPO: ${{ github.repository }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v4

      - name: Compute version from tag
        id: ver
        run: echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      # Ждём, пока Release-workflow создаст релиз и выложит архивы code-index.
      - name: Wait for GitHub Release assets
        run: |
          for i in $(seq 1 60); do
            if gh release view "$TAG" --repo "$REPO" --json assets \
                 -q '.assets[].name' 2>/dev/null | grep -q '^code-index-linux-x64.tar.gz$'; then
              echo "Release-ассеты готовы."
              exit 0
            fi
            echo "Жду ассеты релиза $TAG... попытка $i"
            sleep 15
          done
          echo "Ассеты релиза $TAG не появились за отведённое время."
          exit 1

      # Подставляем версию из тега в server.json и npm/package.json,
      # чтобы единственным источником истины был сам тег релиза.
      - name: Sync version into manifests
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.json.tmp
          mv server.json.tmp server.json
          jq --arg v "$VERSION" '.version = $v' npm/package.json > npm/package.json.tmp
          mv npm/package.json.tmp npm/package.json

      # --- Публикация npm-обёртки ---
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish npm package
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # --- Публикация визитки в официальный MCP-реестр ---
      # mcp-publisher тянем из релизов реестра (linux amd64).
      - name: Install mcp-publisher
        run: |
          gh release download --repo modelcontextprotocol/registry \
            --pattern 'mcp-publisher_linux_amd64.tar.gz' --output mcp-publisher.tar.gz
          tar xzf mcp-publisher.tar.gz mcp-publisher
          chmod +x mcp-publisher

      # ВНИМАНИЕ: точное имя метода логина и аргументы свериться один раз
      # через `./mcp-publisher login --help` при первом прогоне. Для GitHub
      # Actions используется OIDC-аутентификация (id-token: write выше).
      - name: Login to MCP Registry (GitHub OIDC)
        run: ./mcp-publisher login github-oidc

      - name: Publish server.json
        run: ./mcp-publisher publish
