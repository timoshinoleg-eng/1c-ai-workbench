<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="390" viewBox="0 0 1100 390">
  <rect width="1100" height="390" fill="#f8fafc"/>
  <style>.box{fill:#fff;stroke:#cbd5e1;stroke-width:2;rx:18}.t{font:700 21px Segoe UI,Arial;fill:#0f172a}.s{font:16px Segoe UI,Arial;fill:#475569}.n{font:700 18px Segoe UI,Arial;fill:#fff}.circle{fill:#2563eb}.arr{stroke:#2563eb;stroke-width:4;marker-end:url(#a)}</style>
  <defs><marker id="a" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto"><path d="M0,0 L12,6 L0,12 z" fill="#2563eb"/></marker></defs>
  <circle class="circle" cx="68" cy="70" r="25"/><text class="n" x="62" y="77">1</text>
  <rect class="box" x="35" y="105" width="210" height="145" rx="18"/><text class="t" x="62" y="145">Сделать копию</text><text class="s" x="62" y="178">не рабочая база</text><text class="s" x="62" y="204">без паролей и данных</text><text class="s" x="62" y="230">только конфигурация</text>
  <line class="arr" x1="260" y1="175" x2="345" y2="175"/>
  <circle class="circle" cx="398" cy="70" r="25"/><text class="n" x="392" y="77">2</text>
  <rect class="box" x="360" y="105" width="225" height="145" rx="18"/><text class="t" x="390" y="145">Выгрузить в файлы</text><text class="s" x="390" y="178">папка dump</text><text class="s" x="390" y="204">обычное действие</text><text class="s" x="390" y="230">в Конфигураторе</text>
  <line class="arr" x1="600" y1="175" x2="685" y2="175"/>
  <circle class="circle" cx="738" cy="70" r="25"/><text class="n" x="732" y="77">3</text>
  <rect class="box" x="700" y="105" width="225" height="145" rx="18"/><text class="t" x="730" y="145">Построить поиск</text><text class="s" x="730" y="178">локально</text><text class="s" x="730" y="204">на компьютере</text><text class="s" x="730" y="230">партнёра</text>
  <line class="arr" x1="940" y1="175" x2="1000" y2="175"/>
  <circle class="circle" cx="1018" cy="70" r="25"/><text class="n" x="1007" y="77">4</text>
  <rect class="box" x="960" y="105" width="115" height="145" rx="18"/><text class="t" x="982" y="145">Задать</text><text class="t" x="982" y="174">вопросы</text><text class="s" x="982" y="207">проверить</text><text class="s" x="982" y="230">руками</text>
  <text class="s" x="95" y="325">Цель теста: проверить на своей 1С, показывает ли программа реальные места или выдумывает.</text>
</svg>
